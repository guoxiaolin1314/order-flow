  async download() {
    const data = this.getFormData();
    
    // 验证数据
    if (!data.customerName && !data.customerShort) {
      showToast('请先选择客户', 'warning');
      return;
    }
    if (data.items.length === 0 || !data.items[0].name) {
      showToast('请至少填写一个产品', 'warning');
      return;
    }
    // 检查克重是否填写
    var missingWeight = false;
    for (var i = 0; i < data.items.length; i++) {
      if (!data.items[i].weight || data.items[i].weight.trim() === '') {
        missingWeight = true; break;
      }
    }
    if (missingWeight) {
      showToast('请填写所有产品的克重（必填）', 'warning');
      return;
    }
    
    const fileName = `TO${data.customerShort}-厚海锐膜报价单${data.isTaxIncluded ? '含税' : '不含税'}-${formatDateNum(data.date)}.docx`;
    
    try {
      // 显示进度
      openModal('生成中', `
        <div style="text-align:center;padding:30px;">
          <div style="font-size:48px;margin-bottom:16px;">📄</div>
          <h3>正在生成报价单...</h3>
          <p style="color:var(--gray-500);margin-top:8px;" id="wordProgress">准备中...</p>
          <div style="width:100%;height:6px;background:var(--gray-200);border-radius:3px;margin-top:16px;overflow:hidden;">
            <div id="wordProgressBar" style="height:100%;width:0%;background:var(--primary);border-radius:3px;transition:width 0.3s;"></div>
          </div>
        </div>
      `);
      
      const progress = (msg) => {
        const el = document.getElementById('wordProgress');
        const bar = document.getElementById('wordProgressBar');
        if (el) el.textContent = msg;
        if (bar) {
          const pcts = {'加载模板...': 20, '解压文档...': 40, '填充数据...': 60, '渲染文档...': 75, '生成文件...': 90, '完成！': 100};
          if (bar) bar.style.width = (pcts[msg] || 50) + '%';
        }
      };
      
      // 构建模板数据
      const templateData = WordGen.buildQuoteDocData(data);
      
      // 生成 Word 文档
      const result = await WordGen.generateDocx({
        templateName: '报价单模板-占位符版.docx',
        data: templateData,
        fileName: fileName,
        onProgress: progress
      });
      
      // 关闭进度弹窗
      closeModal();
      
      // 保存到历史
      DB.add('quotedocs', {
        ...data,
        fileName: fileName,
        createdAt: new Date().toISOString()
      });
      
      showToast(`✅ 报价单已生成并下载：${fileName}`, 'success');
      
    } catch (error) {
      closeModal();
      showToast('❌ ' + error.message, 'error');
      console.error('报价单生成失败:', error);
      
      // 显示诊断信息
      openModal('生成失败', `
        <div style="text-align:center;padding:20px;">
          <div style="font-size:48px;margin-bottom:16px;">❌</div>
          <h3>生成失败</h3>
          <p style="color:var(--danger);margin:12px 0;">${error.message}</p>
          <div style="background:var(--gray-50);padding:16px;border-radius:8px;text-align:left;font-size:13px;">
            <p><strong>可能的原因：</strong></p>
            <p>1. 模板文件 报价单模板-占位符版.docx 不存在</p>
            <p>2. 文件需要通过 HTTP 服务访问（双击 index.html 可能因安全策略受限）</p>
            <p>3. 模板中的占位符与代码不匹配</p>
            <hr style="margin:8px 0;">
            <p><strong>解决方案：</strong></p>
            <p>✅ 使用 VS Code 的 Live Server 或 Python HTTP 服务器打开</p>
            <p>✅ 或使用以下命令：<code>py -m http.server 8080</code></p>
            <p>✅ 然后访问 http://localhost:8080</p>
          </div>
        </div>
      `, `<button class="btn btn-primary" onclick="closeModal()">知道了</button>`);
    }
  }
};

            <div class="form-group"><label>开户行</label><input class="form-control" id="ctBankName" value="${this.isTaxIncluded ? '广东鹤山农村商业银行股份有限公司三连支行' : '中国建设银行股份有限公司佛山南海支行'}"></div>
            <div class="form-group"><label>账号</label><input class="form-control" id="ctBankAccount" value="${this.isTaxIncluded ? '80020000020368368' : '6217003110034659571'}"></div>

        </div>

      <!-- 区域3：操作 -->
      <div class="card">
        <div class="card-body" style="display:flex;gap:12px;justify-content:flex-end;">

  calcAmount(idx) {
    const qty = parseFloat(document.getElementById(`ct_qty_${idx}`)?.value) || 0;
    const price = parseFloat(document.getElementById(`ct_price_${idx}`)?.value) || 0;
    const amount = qty * price;
    document.getElementById(`ct_amount_${idx}`).textContent = amount ? formatMoney(amount) : '-';
    if (this.items[idx]) {
      this.items[idx].qty = qty;
      this.items[idx].price = price;
      this.items[idx].amount = amount;
    }
    this.updateTotal();
  },

  updateTotal() {
    let total = 0;
    this.items.forEach((_, idx) => {
      const qty = parseFloat(document.getElementById(`ct_qty_${idx}`)?.value) || 0;
      const price = parseFloat(document.getElementById(`ct_price_${idx}`)?.value) || 0;
      total += qty * price;
    });
    document.getElementById('ctTotalAmount').textContent = '¥' + formatMoney(total);
    document.getElementById('ctTotalUpper').textContent = numberToChineseUpper(total);
    return total;
  },

  setTaxMode(included) {
    this.isTaxIncluded = included;
    // 切换含税/不含税时同步更新收款信息显示
    if (included) {
      document.getElementById('ctBankName').value = '广东鹤山农村商业银行股份有限公司三连支行';
      document.getElementById('ctBankAccount').value = '80020000020368368';
    } else {
      document.getElementById('ctBankName').value = '中国建设银行股份有限公司佛山南海支行';
      document.getElementById('ctBankAccount').value = '6217003110034659571';
    }
    navigate('contract');
  },

  /** 页面加载时检查是否有从报价单预览导入的数据 */
  onPageLoad() {
    const raw = sessionStorage.getItem('qdImportData');
    if (!raw) { console.log('[contract] 没有待导入数据'); return; }
    console.log('[contract] 发现待导入数据:', raw.slice(0, 100));
    sessionStorage.removeItem('qdImportData');
    try {
      const data = JSON.parse(raw);
      if (!data.items || data.items.length === 0) {
        console.warn('[contract] 导入数据没有items');
        showToast('导入数据为空', 'warning');
        return;
      }
      // 填充产品
      this.items = data.items.map(function(item){
        return {
          id: 'c' + Date.now() + Math.random().toString(36).slice(2,4),
          name: item.name || '',
          spec: (item.baseFabric ? '底布：' + item.baseFabric : '') + (item.protectLayer ? '  保护层：' + item.protectLayer : '') + (item.weight ? '  克重：' + item.weight + '±0.2g/m²' : ''),
          appearance: item.appearance || '',
          qty: '',
          price: item.price || '',
          amount: ''
        };
      });
      this.customerId = data.customerId || '';
      this.isTaxIncluded = data.isTaxIncluded !== false;
      console.log('[contract] 导入成功:', this.items.length, '个产品');
      // 重绘
      navigate('contract');
      setTimeout(function(){ ContractModule.onCustomerChange(); }, 100);
      showToast('已从报价单导入：' + (data.sourceTitle || '') + ' (' + data.items.length + '个产品)');
    } catch(e) {
      console.warn('[contract] 导入数据解析失败:', e);
      showToast('导入数据解析失败', 'error');
    }
  },

  onCustomerChange() {
    const sel = document.getElementById('ctCustomer');
    this.customerId = sel.value;
    const c = DB.getById('customers', this.customerId);
    if (c) {
      document.getElementById('ct_companyName').value = c.companyName || '';
      document.getElementById('ct_address').value = c.address || '';
      document.getElementById('ct_contact').value = c.contact || '';
      document.getElementById('ct_phone').value = c.phone || '';
    }
  },

  addItem() {
    this.items.push({ id: 'c' + Date.now(), name: '', spec: '', appearance: '', qty: '', price: '', amount: '' });
    navigate('contract');
  },

  removeItem(idx) {
    this.items.splice(idx, 1);
    navigate('contract');
  },

  importFromQuote() {
    // 先检查是否有从报价单生成模块导入的临时数据
    const pending = sessionStorage.getItem('qdImportData');
    if (pending) {
      try {
        const data = JSON.parse(pending);
        if (data && data.items && data.items.length > 0) {
          sessionStorage.removeItem('qdImportData');
          this._applyImportData(data);
          return;
        }
      } catch(e) {}
    }
    const docs = DB.get('quotedocs');
    if (docs.length === 0) {
      showToast('暂无报价单数据，请先在报价单模块生成', 'warning');
      return;
    }
    // 按创建时间倒序排列
    const sorted = docs.slice().sort(function(a,b){ return (b.createdAt||'') > (a.createdAt||'') ? 1 : -1; });
    const list = sorted.map(function(d){
      return '<div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-100);\">' +
        '<div style=\"flex:1;cursor:pointer;\" onclick=\"ContractModule.doImport(\'' + d.id + '\')\">' +

  async download() {
    const data = this.getFormData();
    
    // 验证数据
    if (!data.customerName && !data.customerShort) {
      showToast('请先选择客户', 'warning');
      return;
    }
    if (data.items.length === 0 || !data.items[0].name) {
      showToast('请至少填写一个产品', 'warning');
      return;
    }
    if (data.totalAmount <= 0) {
      showToast('请填写产品数量和单价', 'warning');
      return;
    }
    
    const fileName = `TO${data.customerShort}-厚海锐膜购销合同${data.taxStr}-${formatDateNum(data.signDate)}.docx`;
    const templateName = data.isTaxIncluded ? '购销合同模板-含税版-占位符.docx' : '购销合同模板-不含税版-占位符.docx';
    
    try {
      // 显示进度
      openModal('生成中', `
        <div style="text-align:center;padding:30px;">
          <div style="font-size:48px;margin-bottom:16px;">📝</div>
          <h3>正在生成合同...</h3>
          <p style="color:var(--gray-500);margin-top:8px;" id="wordProgress">准备中...</p>
          <div style="width:100%;height:6px;background:var(--gray-200);border-radius:3px;margin-top:16px;overflow:hidden;">
            <div id="wordProgressBar" style="height:100%;width:0%;background:var(--primary);border-radius:3px;transition:width 0.3s;"></div>
          </div>
        </div>
      `);
      
      const progress = (msg) => {
        const el = document.getElementById('wordProgress');
        const bar = document.getElementById('wordProgressBar');
        if (el) el.textContent = msg;
        if (bar) {
          const pcts = {'加载模板...': 20, '解压文档...': 40, '填充数据...': 60, '渲染文档...': 75, '生成文件...': 90, '完成！': 100};
          if (bar) bar.style.width = (pcts[msg] || 50) + '%';
        }
      };
      
      // 构建模板数据（强制校准收款信息）
      if (!data.isTaxIncluded) {
        data.bankName = document.getElementById('ctBankName')?.value || '中国建设银行股份有限公司佛山南海支行';
        data.bankAccount = document.getElementById('ctBankAccount')?.value || '6217003110034659571';
      } else {
        data.bankName = '广东鹤山农村商业银行股份有限公司三连支行';
        data.bankAccount = '80020000020368368';
      }
      console.log('[下载] isTaxIncluded:', data.isTaxIncluded, 'bankName:', data.bankName, 'bankAccount:', data.bankAccount);
      var _bank = data.bankName;
      var _acct = data.bankAccount;
      const templateData = WordGen.buildContractData(data);
      // 强制覆盖——确保模板数据绝对正确
      templateData['供方_开户银行'] = _bank;
      templateData['供方_银行账号'] = _acct;
      templateData['收款人'] = document.getElementById('ctPayee')?.value || '吴敏琼';
      console.log('[下载] 模板数据写入:', templateData['供方_开户银行'], templateData['供方_银行账号'], '收款人:', templateData['收款人']);
      
      // 生成 Word 文档
      const result = await WordGen.generateDocx({
        templateName: templateName,
        data: templateData,
        fileName: fileName,
        onProgress: progress
      });
      
      closeModal();
      
      // 保存到历史
      DB.add('contracts', {
        ...data,
        fileName: fileName,
        createdAt: new Date().toISOString()
      });
      
      showToast(`✅ 合同已生成并下载：${fileName}`, 'success');
      
    } catch (error) {
      closeModal();
      showToast('❌ ' + error.message, 'error');
      console.error('合同生成失败:', error);
      
      openModal('生成失败', `
        <div style="text-align:center;padding:20px;">
          <div style="font-size:48px;margin-bottom:16px;">❌</div>
          <h3>生成失败</h3>
          <p style="color:var(--danger);margin:12px 0;">${error.message}</p>
          <div style="background:var(--gray-50);padding:16px;border-radius:8px;text-align:left;font-size:13px;">
            <p><strong>可能的原因：</strong></p>
            <p>1. 模板文件 ${templateName} 不存在</p>
            <p>2. 需要通过 HTTP 服务访问（双击 index.html 可能因安全策略受限）</p>
            <p>3. 模板中的占位符与实际代码不匹配</p>
            <hr style="margin:8px 0;">
            <p><strong>解决方案：</strong></p>
            <p>✅ 使用 VS Code 的 Live Server 或：<code>py -m http.server 8080</code></p>
            <p>✅ 然后访问 http://localhost:8080</p>
          </div>
        </div>
      `, `<button class="btn btn-primary" onclick="closeModal()">知道了</button>`);
    }
  }
};

        </td>
        <td class="text-center">

    return `

              <div style="display:flex;gap:8px;">
                <button class="btn ${this.calcMode === 'forward' ? 'btn-primary' : 'btn-outline'}" onclick="ScheduleModule.setMode('forward')">▶ 顺推（知开工算交货）</button>
                <button class="btn ${this.calcMode === 'backward' ? 'btn-primary' : 'btn-outline'}" onclick="ScheduleModule.setMode('backward')">◀ 逆推（知交货算开工）</button>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-header"><h3>⚙️ 生产参数</h3></div>

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">

              <div class="form-group">
                <label>每台机日产米数</label>
                <input class="form-control" id="scMetersPerDay" type="number" value="500" min="1">

                <label>开机台数</label>
                <input class="form-control" id="scMachines" type="number" value="2" min="1">

                <label>配方编号</label>
                <select class="form-control" id="scFormula">
                <option value="">-- 选择配方 --</option>
                ${DB.get('formulas').map(f => `<option value="${f.code || f.name}">${f.code || f.name}</option>`).join('')}
              </select>
              </div>
            </div>

            <!-- 中列：模切参数 -->
            <div style="padding:12px;border:1px solid var(--gray-200);border-radius:8px;">
              <div id="scopeModCut"><h4 style="margin-bottom:8px;">✂️ 模切参数</h4>
              <div class="form-group">

              </div>
            </div>

            <!-- 右列：全检/成品/辐照 -->
            <div style="padding:12px;border:1px solid var(--gray-200);border-radius:8px;">
              </div><h4 style="margin-bottom:8px;">🔍 全检 & 成品 & 辐照 <span style="font-size:11px;color:var(--gray-400);">(选择卷材时忽略)</span></h4>
              <div class="form-group">
                <div id="scopeInspect"><label>全检人数</label>
                <input class="form-control" id="scInspectWorkers" type="number" value="2" min="1">
              </div>
              <div class="form-group">
                <label>全检速度 (片/人/天)</label>
                <input class="form-control" id="scInspectSpeed" type="number" value="3500" min="1">
              </div>
              <div class="form-group">
                <div id="scopeFinish">
                <label>成品加工天数</label>
                <input class="form-control" id="scFinishDays" type="number" value="5" min="1">
              </div>
              <div class="form-group">
                <label>成品加工方</label>
                <select class="form-control" id="scFinishVendor">
                  <option value="三好">三好</option>
                  <option value="惠好">惠好</option>
                  <option value="自加工">自加工</option>
                </select></div>
              </div>
              <div class="form-group">
                <span id="scopeIrra"><div class="form-group"><label><input type="checkbox" id="scNeedIrradiation" checked> 需要辐照灭菌</label></div>
              <div class="form-group" id="scIrrVendorGroup">
                <label>辐照公司</label>
                <select class="form-control" id="scIrrVendor">
                  <option value="佛塑保利">佛塑保利</option>
                  <option value="广州辐照">广州辐照</option>
                  <option value="深圳辐照">深圳辐照</option>
                  <option value="佛山辐照">佛山辐照</option>

            </div>
          </div>
        </div>
      </div>

      <!-- 区域4：操作按钮 -->
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <button class="btn btn-primary" onclick="ScheduleModule.calculate()">📊 计算排产</button>
        <button class="btn btn-success" onclick="ScheduleModule.save()">💾 保存排产</button>
        <button class="btn btn-outline" onclick="ScheduleModule.exportExcel()">📥 导出Excel</button>
      </div>

      <!-- 区域5：排产结果 -->
      <div class="card" style="margin-bottom:16px;display:none;" id="scResultCard">
        <div class="card-header"><h3>📊 排产时间线</h3></div>
        <div class="card-body" id="scResultBody"></div>
      </div>

      <!-- 区域6：已保存排产记录 -->
      <div class="card">
        <div class="card-header"><h3>📜 排产历史</h3></div>
        <div class="card-body" id="scHistoryBody">
          ${this.renderHistory()}
        </div>
      </div>
    `;
  },

  onScopeChange() {
    this._prodScope = document.getElementById('scScope')?.value || 'finished';
    this.applyScopeHide();
  },

  setMode(mode) {
    this.calcMode = mode;
    navigate('schedule');
  },

  // ========== 产品管理 ==========
  addItem() {
    this.items.push({ id: 'sc' + Date.now(), name: '', spec: '', quantity: '', unit: '片', cutShape: '上下脸' });
    navigate('schedule');
  },

  removeItem(idx) {
    if (this.items.length <= 1) { showToast('至少保留一个产品', 'warning'); return; }
    this.items.splice(idx, 1);
    navigate('schedule');
  },

  // ========== 核心计算 ==========

  /** 步骤1：计算需生产面积/米数/卷数 */
  calcProductionNeed(orderQty, cutShape) {
    if (!orderQty) return null;
    const perSqm = this.CONFIG.cuttingPerSqm[cutShape] || 16;
    const theoryArea = orderQty / perSqm;
    const yieldRate = parseFloat(document.getElementById('scYieldRate')?.value) / 100 || 0.8;
    const actualArea = theoryArea / yieldRate;
    const width = this.CONFIG.spinning.width;
    const meters = actualArea / width;
    const rollLength = this.CONFIG.spinning.rollLength;
    const rolls = Math.ceil(meters / rollLength);
    return { perSqm, theoryArea, actualArea, meters, rolls };
  },


    /** 步骤2：计算各工序天数 */
  calcProcessDays(need) {
    const machines = parseInt(document.getElementById('scMachines')?.value) || 2;
    const metersPerDay = machines * this.CONFIG.spinning.metersPerMachinePerDay;
    const spinningDays = Math.max(1, Math.ceil(need.meters / metersPerDay));
    const cutDays = parseInt(document.getElementById('scCutDays')?.value) || 5;
    const inspectWorkers = parseInt(document.getElementById('scInspectWorkers')?.value) || 2;
    const inspectSpeed = parseInt(document.getElementById('scInspectSpeed')?.value) || 3500;
    const inspectDays = Math.max(1, Math.ceil(need.orderQty / (inspectWorkers * inspectSpeed)));
    const finishDays = parseInt(document.getElementById('scFinishDays')?.value) || 5;
    const needIrr = document.getElementById('scNeedIrradiation')?.checked || false;
    const irradDays = needIrr ? this.CONFIG.irradiation.days : 0;
    const storeDays = 1;
    const bufferDays = parseInt(document.getElementById('scBuffer')?.value) || 2;
    return { spinningDays, cutDays, inspectDays, finishDays, irradDays, storeDays, bufferDays };
  },

  /** 跳过周末 */
  _nextWorkDay(date, forward) {
    const d = new Date(date);
    while (d.getDay() === 0 || d.getDay() === 6) {
      d.setDate(d.getDate() + (forward ? 1 : -1));
    }
    return d;
  },

  /** 加工日计算（跳过周末） */
  addWorkDays(startDate, days) {
    let d = new Date(startDate);
    let count = 0;
    const dir = days >= 0 ? 1 : -1;
    const absDays = Math.abs(days);
    while (count < absDays) {
      d.setDate(d.getDate() + dir);
      if (d.getDay() !== 0 && d.getDay() !== 6) count++;
    }
    return d;
  },

  /** 步骤3：生成排产时间线 */
  generateTimeline(startDate, need, processDays, prodScope) {
    const timeline = [];
    let seq = 1;
    let current = new Date(startDate);

    // 外协方周末不收货
    const noWeekendReceive = document.getElementById('scWeekendNoReceive')?.checked || false;
    const cutVendor = document.getElementById('scCutVendor')?.value || '浦永澌';
    const finishVendor = document.getElementById('scFinishVendor')?.value || '三好';
    const formula = document.getElementById('scFormula')?.value || '';
    const irrVendor = document.getElementById('scIrrVendor')?.value || '广州辐照';
    const deadlineStr = document.getElementById('scDeadline')?.value || '';
    const orderQty = need.orderQty;
    const unit = need.unit || '片';

    function skipWeekend(d, forward) {
      return this && this._nextWorkDay ? this._nextWorkDay(d, forward) : (() => { const dd=new Date(d); while(dd.getDay()===0||dd.getDay()===6)dd.setDate(dd.getDate()+(forward?1:-1)); return dd; })();
    }

    // 1. 溶液配制（纺丝前1天）
    const solnDate = new Date(current);
    solnDate.setDate(solnDate.getDate() - 1);
    timeline.push({ seq: seq++, process: '溶液配制', plannedDate: this._nextWorkDay(solnDate, true), content: formula ? `配制${formula}溶液` : '配制溶液', plannedOutput: `${need.meters.toFixed(0)}米用量`, status: '待执行', remark: '现配现用' });

    // 2. 纺丝（多天）
    for (let i = 0; i < processDays.spinningDays; i++) {
      const isFirst = i === 0;
      const dayMeters = i === processDays.spinningDays - 1
        ? need.meters - (i * (parseInt(document.getElementById('scMachines')?.value) || 2) * 500)
        : (parseInt(document.getElementById('scMachines')?.value) || 2) * 500;
      timeline.push({ seq: seq++, process: '纺丝', plannedDate: this.addWorkDays(current, i), content: isFirst ? `${document.getElementById('scLine')?.value || ''}开纺` : '继续纺丝', plannedOutput: `${Math.max(0, dayMeters).toFixed(0)}米`, status: '待执行', remark: isFirst ? `${document.getElementById('scMachines')?.value || 2}台机开机` : '' });
    }
    current = this.addWorkDays(current, processDays.spinningDays);

    if (prodScope !== 'roll') {
    // 5. 送外协模切（考虑周末不收货）
    let sendDate = current;
    if (noWeekendReceive && sendDate.getDay() === 5) {
      // 周五送=下周一才收
      sendDate = this.addWorkDays(sendDate, 3);
    }
    timeline.push({ seq: seq++, process: '送模切', plannedDate: sendDate, content: `送${cutVendor}外协模切`, plannedOutput: '', status: '待执行', remark: '隔天发货' });
    current = this.addWorkDays(sendDate, 1);

    // 6. 外协模切
    for (let i = 0; i < processDays.cutDays; i++) {
      timeline.push({ seq: seq++, process: '模切', plannedDate: current, content: `${cutVendor}外协模切中`, plannedOutput: '', status: '待执行', remark: `第${i+1}/${processDays.cutDays}天` });
      current = this.addWorkDays(current, 1);
    }

    // 4. 模切回厂
    timeline.push({ seq: seq++, process: '模切', plannedDate: current, content: `${cutVendor}模切完成`, plannedOutput: `${orderQty}${unit}`, status: '待执行', remark: `${cutVendor}共${processDays.cutDays}天` });
    current = this.addWorkDays(current, 1);

    } // end 模切
    if (prodScope !== 'roll') {
    // 5. 全检
    const inspectWorkers = parseInt(document.getElementById('scInspectWorkers')?.value) || 2;
    const inspectSpeed = parseInt(document.getElementById('scInspectSpeed')?.value) || 3500;
    const dailyInspect = inspectWorkers * inspectSpeed;
    for (let i = 0; i < processDays.inspectDays; i++) {
      const remaining = Math.max(0, orderQty - i * dailyInspect);
      const todayOutput = Math.min(remaining, dailyInspect);
      timeline.push({ seq: seq++, process: '全检', plannedDate: current, content: `人工全检（${inspectWorkers}人）`, plannedOutput: `${todayOutput}${unit}`, status: '待执行', remark: `第${i+1}/${processDays.inspectDays}天` });
      current = this.addWorkDays(current, 1);
    }

    } // end 全检
    if (prodScope === 'finished') {
    // 6. 成品加工
    for (let i = 0; i < processDays.finishDays; i++) {
      timeline.push({ seq: seq++, process: '成品加工', plannedDate: current, content: `${finishVendor}成品加工`, plannedOutput: '', status: '待执行', remark: `第${i+1}/${processDays.finishDays}天` });
      current = this.addWorkDays(current, 1);
    }

    } // end 成品
    // 7. 辐照
    // 8. 辐照
    timeline.push({ seq: seq++, process: '入库', plannedDate: current, content: '成品入库', plannedOutput: `${orderQty}${unit}`, status: '待执行', remark: '' });
    current = this.addWorkDays(current, 1);

    if (processDays.irradDays > 0) {
      timeline.push({ seq: seq++, process: '辐照', plannedDate: current, content: '送' + irrVendor + '辐照灭菌', plannedOutput: '', status: '待执行', remark: '' });
      current = this.addWorkDays(current, 1);
    }

    // 9. 发货
    timeline.push({ seq: seq++, process: '发货', plannedDate: current, content: '发货给客户', plannedOutput: `${orderQty}${unit}`, status: '待执行', remark: `计划交货日：${deadlineStr}` });

    return timeline;
  },

  // ========== 主计算入口 ==========
  calculate() {
    // 收集表单数据
    const deadline = document.getElementById('scDeadline')?.value || '';
    if (!deadline) { showToast('请选择计划交货日', 'warning'); return; }

    const firstItem = this._getItems();
    if (!firstItem || !firstItem.name) { showToast('请至少填写一个产品名称', 'warning'); return; }

    const orderQty = firstItem.quantity;
    if (!orderQty || orderQty <= 0) { showToast('请填写产品数量', 'warning'); return; }

    // 计算需生产面积
    const need = this.calcProductionNeed(orderQty, firstItem.cutShape);
    if (!need) { showToast('计算失败', 'error'); return; }
    need.orderQty = orderQty;
    need.unit = firstItem.unit;

    // 计算工序天数
    const processDays = this.calcProcessDays(need);

    // 确定起始日期
    const calcMode = this.calcMode;
    const baseDate = document.getElementById('scDate')?.value || '';
    let startDate;

    if (calcMode === 'forward') {
      startDate = baseDate || new Date().toISOString().slice(0,10);
    } else {
      // 逆推：从交货日往前倒推
      const totalDays = timeline ? timeline.length : processDays.spinningDays + processDays.cutDays + processDays.inspectDays + processDays.finishDays + processDays.irradDays + processDays.storeDays + processDays.bufferDays;
      const deadlineDate = new Date(deadline + 'T00:00:00');
      let d = new Date(deadlineDate);
      let count = 0;
      while (count < totalDays) {
        d.setDate(d.getDate() - 1);
        if (d.getDay() !== 0 && d.getDay() !== 6) count++;
      }
      startDate = d.toISOString().slice(0,10);
    }

    // 读取生产范围
    const prodScope = document.getElementById('scScope')?.value || 'finished';
    const filterMap = {'finished':['溶液配制','纺丝','送模切','模切','全检','成品加工','入库','辐照','发货'],'sheet':['溶液配制','纺丝','送模切','模切','全检','入库','辐照','发货'],'roll':['溶液配制','纺丝','入库','辐照','发货']};
    const allowed = filterMap[prodScope] || filterMap['finished'];
    const fullTL = this.generateTimeline(startDate, need, processDays, prodScope);
    var timeline = [];
    var d = new Date(startDate);
    fullTL.forEach(function(t){
      if (allowed.indexOf(t.process) >= 0) {
        t.seq = timeline.length + 1;
        t.plannedDate = new Date(d);
        timeline.push(t);
        do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
      }
    });

    // 计算汇总
    const totalWorkDays = Math.max(1, Math.round((new Date(timeline[timeline.length-1]?.plannedDate) - new Date(timeline[0]?.plannedDate)) / (24*60*60*1000))) + 1;
    const lastStep = timeline[timeline.length - 1];
    const estEndDate = lastStep?.plannedDate || '';

    
    // 渲染结果
    document.getElementById('scResultCard').style.display = '';
    document.getElementById('scResultBody').innerHTML = this._renderTimeline(timeline, need, processDays, startDate, estEndDate, deadline);

    showToast(`✅ 排产计算完成：${need.rolls}卷，${totalWorkDays}个工作日`, 'success');
  },

  /** 收集产品数据 */
  _getItems() {
    return this.items.map((_, idx) => ({
      name: document.getElementById(`sc_name_${idx}`)?.value || '',
      spec: document.getElementById(`sc_spec_${idx}`)?.value || '',
      quantity: parseFloat(document.getElementById(`sc_qty_${idx}`)?.value) || 0,
      unit: document.getElementById(`sc_unit_${idx}`)?.value || '片',
      cutShape: document.getElementById(`sc_shape_${idx}`)?.value || '上下脸',
    })).filter(i => i.name)[0] || null;
  },

  /** 渲染时间线表格 */
  _renderTimeline(timeline, need, processDays, startDate, estEndDate, deadline) {
    const itemsHtml = timeline.map(t => {
      const statusClass = t.status === '已完成' ? 'status-done' : t.status === '进行中' ? 'status-progress' : t.status === '已延迟' ? 'status-delay' : '';
      const statusIcon = t.status === '已完成' ? '✅' : t.status === '进行中' ? '🔵' : t.status === '已延迟' ? '⚠️' : '';
      const dateStr = this._formatDateShort(t.plannedDate);
      return `<tr class="${statusClass}">
        <td class="text-center">${t.seq}</td>
        <td><strong>${t.process}</strong></td>
        <td>${dateStr}</td>
        <td>${t.content}</td>
        <td>${t.plannedOutput}</td>
        <td><input class="form-control" style="width:80px;text-align:right;" onchange="ScheduleModule._updateActual(${t.seq})" id="sc_actual_${t.seq}" placeholder="实际"></td>
        <td><input class="form-control" style="width:60px;text-align:right;" onchange="ScheduleModule._updateYield(${t.seq})" id="sc_yield_${t.seq}" placeholder="%" style="font-size:12px;"></td>
        <td>
          <select class="form-control" style="font-size:12px;" onchange="ScheduleModule._updateStatus(${t.seq}, this.value)" id="sc_status_${t.seq}">
            <option value="待执行"${t.status === '待执行' ? ' selected' : ''}>${statusIcon}待执行</option>
            <option value="进行中"${t.status === '进行中' ? ' selected' : ''}>🔵进行中</option>
            <option value="已完成"${t.status === '已完成' ? ' selected' : ''}>✅已完成</option>
            <option value="已延迟"${t.status === '已延迟' ? ' selected' : ''}>⚠️已延迟</option>
          </select>
        </td>
        <td style="font-size:12px;">${t.remark}</td>
      </tr>`;
    }).join('');

    const totalDays = Math.max(1, Math.round((new Date(timeline[timeline.length-1]?.plannedDate) - new Date(timeline[0]?.plannedDate)) / (24*60*60*1000))) + 1;
    const deadlineDate = new Date(deadline + 'T00:00:00');
    const endDate = estEndDate ? new Date(estEndDate) : null;
    const delayDays = endDate ? Math.ceil((endDate - deadlineDate) / (1000 * 60 * 60 * 24)) : 0;
    const delayWarn = delayDays > 0 ? `<span style="color:var(--danger);font-weight:bold;">⚠️ 预计延迟 ${delayDays} 天交货！</span>` : '';

    return `
      <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px;">
        <div class="stat-card">
          <div class="stat-icon blue">📦</div>
          <div class="stat-info"><h4>${need.rolls}卷</h4><p>需生产卷数</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">📐</div>
          <div class="stat-info"><h4>${parseFloat(need.meters).toFixed(0)}米</h4><p>需生产米数</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">📅</div>
          <div class="stat-info"><h4>${this._formatDateShort(startDate)}</h4><p>开工日期</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">🚚</div>
          <div class="stat-info"><h4>${endDate ? this._formatDateShort(endDate) : '-'}</h4><p>预计完成</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ${delayDays > 0 ? 'red' : 'green'}">${delayDays > 0 ? '⚠️' : '✅'}</div>
          <div class="stat-info"><h4>${totalDays}天</h4><p>${delayWarn || '总工作日'}</p></div>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr style="background:var(--gray-50);">
              <th style="width:40px;">#</th>
              <th style="min-width:80px;">工序</th>
              <th style="min-width:100px;">计划日期</th>
              <th style="min-width:160px;">工作内容</th>
              <th style="min-width:100px;">计划产出</th>
              <th style="min-width:80px;">实际产出</th>
              <th style="min-width:50px;">良品率</th>
              <th style="min-width:100px;">状态</th>
              <th style="min-width:140px;">备注</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
          </tbody>
        </table>
      </div>
    `;
  },

  _formatDateShort(date) {
    if (!date) return '-';
    const d = date instanceof Date ? date : new Date(date + 'T00:00:00');
    const month = d.getMonth() + 1;
    const day = d.getDate();
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    const wd = weekdays[d.getDay()];
    return `${month}/${day}(${wd})`;
  },

  // ========== 状态更新 ==========
  _updateStatus(seq, value) {
    showToast(`工序 ${seq} 已更新为「${value}」`, 'success');
  },

  _updateActual(seq) {
    // 实际产出更新 - 后续可扩展自动调整后续日期
    showToast('实际产出已记录', 'success');
  },

  _updateYield(seq) {
    showToast('良品率已记录', 'success');
  },

  // ========== 保存 ==========
  save() {
    const data = this._collectData();
    if (!data) return;
    DB.add('schedules', {
      ...data,
      id: 'sc_' + Date.now(),
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });
    showToast('✅ 排产已保存', 'success');
    navigate('schedule');
  },

  _collectData() {
    const projectNo = document.getElementById('scProjectNo')?.value || '';
    const customerId = document.getElementById('scCustomer')?.value || '';
    const customer = DB.getById('customers', customerId);
    const contractNo = document.getElementById('scContractNo')?.value || '';
    const deadline = document.getElementById('scDeadline')?.value || '';
    const items = this._getItems();
    if (!items) { showToast('请填写产品数据', 'warning'); return null; }
    return { projectNo, customerId, customerName: customer?.companyName || '', customerShort: customer?.shortName || '', contractNo, deadline, items };
  },

  // ========== Excel 导出（XML Spreadsheet 格式，无需库） ==========
  exportExcel() {
    const data = this._collectData();
    if (!data) return;
    if (!data.items) { showToast('请先计算排产', 'warning'); return; }

    // 从结果表读取数据
    const rows = [];
    document.querySelectorAll('#scResultBody table tbody tr').forEach(tr => {
      const tds = tr.querySelectorAll('td');
      if (tds.length >= 7) {
        rows.push({
          seq: tds[0].textContent.trim(),
          process: tds[1].textContent.trim(),
          date: tds[2].textContent.trim(),
          content: tds[3].textContent.trim(),
          planned: tds[4].textContent.trim(),
          actual: tds[5]?.querySelector('input')?.value || '',
          yieldRate: tds[6]?.querySelector('input')?.value || '',
          status: tds[7]?.querySelector('select')?.value || '',
          remark: tds[8]?.textContent.trim() || '',
        });
      }
    });

    if (rows.length === 0) { showToast('请先计算排产', 'warning'); return; }

    // 生成 XML Spreadsheet
    const customerName = data.customerName || '客户';
    const projectNo = data.projectNo || '';
    const contractNo = data.contractNo || '';
    const productName = data.items?.name || '';
    const qty = data.items?.quantity || '';
    const unit = data.items?.unit || '';
    const deadline = data.deadline || '';

    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<?mso-application progid="Excel.Sheet"?>\n';
    xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"\n';
    xml += ' xmlns:o="urn:schemas-microsoft-com:office:office"\n';
    xml += ' xmlns:x="urn:schemas-microsoft-com:office:excel"\n';
    xml += ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';

    // Styles
    xml += '<Styles>\n';
    xml += '<Style ss:ID="Default" ss:Name="Normal"><Font ss:FontName="微软雅黑" ss:Size="10"/></Style>\n';
    xml += '<Style ss:ID="title"><Font ss:FontName="微软雅黑" ss:Size="16" ss:Bold="1"/><Alignment ss:Horizontal="Center"/></Style>\n';
    xml += '<Style ss:ID="header"><Font ss:FontName="微软雅黑" ss:Size="11" ss:Bold="1"/><Interior ss:Color="#D9D9D9" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>\n';
    xml += '<Style ss:ID="normal"><Alignment ss:Horizontal="Center"/></Style>\n';
    xml += '</Styles>\n';

    xml += '<Worksheet ss:Name="排产进度表">\n';
    xml += '<Table>\n';

    // Column widths
    xml += '<Column ss:Width="40"/>\n';  // A
    xml += '<Column ss:Width="80"/>\n';  // B
    xml += '<Column ss:Width="100"/>\n'; // C
    xml += '<Column ss:Width="200"/>\n'; // D
    xml += '<Column ss:Width="80"/>\n';  // E
    xml += '<Column ss:Width="80"/>\n';  // F
    xml += '<Column ss:Width="60"/>\n';  // G
    xml += '<Column ss:Width="80"/>\n';  // H
    xml += '<Column ss:Width="160"/>\n'; // I

    // Title row
    xml += '<Row>\n';
    xml += '<Cell ss:MergeAcross="8" ss:StyleID="title"><Data ss:Type="String">' + this._xmlEsc(customerName + '订单排产进度表 ' + projectNo + ' / ' + contractNo) + '</Data></Cell>\n';
    xml += '</Row>\n';

    // Info row
    xml += '<Row>\n';
    xml += '<Cell ss:MergeAcross="8" ss:StyleID="normal"><Data ss:Type="String">客户：' + this._xmlEsc(customerName) + '  产品：' + this._xmlEsc(productName) + '  数量：' + qty + unit + '  计划交货日：' + deadline + '</Data></Cell>\n';
    xml += '</Row>\n';

    // Empty row
    xml += '<Row/>\n';

    // Header row
    xml += '<Row>\n';
    ['序号', '工序', '计划日期', '工作内容', '计划产出', '实际产出', '良品率', '状态', '备注'].forEach(h => {
      xml += '<Cell ss:StyleID="header"><Data ss:Type="String">' + this._xmlEsc(h) + '</Data></Cell>\n';
    });
    xml += '</Row>\n';

    // Data rows
    rows.forEach(r => {
      xml += '<Row>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.seq) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.process) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.date) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.content) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.planned) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.actual) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.yieldRate) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.status) + '</Data></Cell>\n';
      xml += '<Cell ss:StyleID="normal"><Data ss:Type="String">' + this._xmlEsc(r.remark) + '</Data></Cell>\n';
      xml += '</Row>\n';
    });

    xml += '</Table>\n';
    xml += '</Worksheet>\n';
    xml += '</Workbook>\n';

    // 创建 blob 下载
    const blob = new Blob([xml], { type: 'application/vnd.ms-excel;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (customerName || '排产') + '排产进度表.xls';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Excel已下载', 'success');
  },

  _xmlEsc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  },

  deleteHistory(id) {

    doImportContract(docId) {

    console.log('[导入] 合同数据:', JSON.stringify({id: d.id, customerId: d.customerId, customerName: d.customerName, signDate: d.signDate, items: (d.items||[]).length}));

      }
    }, 100);
  },

  getLastContractNo() {
    const contracts = DB.get('contracts');
    if (contracts.length === 0) return generateContractNo();
    const sorted = contracts.slice().sort(function(a,b){ return (b.createdAt||'') > (a.createdAt||'') ? 1 : -1; });

  onPageLoad() {

/* ===== 主应用 - 路由 & 导航 ===== */

/** 页面导航 */
async function navigate(page) {
  const main = document.getElementById('mainContent');
  const navItems = document.querySelectorAll('.nav-item');
  
  // Update active nav
  navItems.forEach(item => {
    item.classList.toggle('active', item.dataset.page === page);
  });

  // 离开报价引擎时保存状态（必须在改hash之前）
  const curHash = window.location.hash.replace('#', '') || 'dashboard';
  if (curHash === 'quotation-engine' && page !== 'quotation-engine') {
    QuotationEngine.saveState();
  }

  // Update URL hash
  window.location.hash = page;

  // Render page
  switch (page) {
    case 'dashboard':
      main.innerHTML = renderDashboard();
      break;
    case 'quotation-engine':
      main.innerHTML = QuotationEngine.render();
      setTimeout(() => QuotationEngine.restoreState(), 50);
      break;
    case 'quote-doc':
      main.innerHTML = QuoteDocModule.render();
      QuoteDocModule.onPageLoad();
      break;
    case 'contract':
      main.innerHTML = ContractModule.render();
      setTimeout(function(){ ContractModule.onPageLoad(); }, 100);
      break;
    case 'schedule':
      main.innerHTML = ScheduleModule.render();
      setTimeout(function(){ ScheduleModule.onPageLoad(); }, 100);
      break;
    case 'supplier':
      main.innerHTML = SupplierModule.render();
      break;
    case 'customer':
      main.innerHTML = CustomerModule.render();
      break;
    case 'material':
      main.innerHTML = MaterialModule.render();
      break;
    case 'formula':
      main.innerHTML = FormulaModule.render();
      break;
    case 'shape':
      main.innerHTML = ShapeModule.render();
      break;
    case 'formula-calc':
      main.innerHTML = renderFormulaCalc();
      break;
    default:
      main.innerHTML = renderDashboard();
  }
}

const FormulaCalc = {
  _counter: 0,
  _listForType: { single: 'fcSingleList', main: 'fcMainList', sub: 'fcSubList' },

  /** 切换溶液类型 */
  onTypeChange() {
    const type = document.getElementById('fcType').value;
    document.getElementById('fcSingleSection').style.display = type === '单一溶液' ? '' : 'none';
    document.getElementById('fcCompoundSection').style.display = type === '复合溶液' ? '' : 'none';
    document.getElementById('fcCompoundInfo').style.display = type === '复合溶液' ? '' : 'none';
  },

  /** 获取list容器ID */
  getListId(listType) {
    return this._listForType[listType] || 'fcSingleList';
  },

  /** AI Vision API 识别图片中的配方成分表 */
  visionRecognize() {
    var provider = document.getElementById('fcAiProvider')?.value || 'openai';
    var apiKey = document.getElementById('fcAiKeyInput')?.value?.trim() || '';
    if (!apiKey) { showToast('请输入 API Key', 'warning'); return; }
    // 保存到本地
    localStorage.setItem('ai_vision_key', apiKey);
    localStorage.setItem('ai_vision_provider', provider);
    
    var imgData = FormulaCalc._pendingImgData;
    if (!imgData) { showToast('请先上传图片', 'warning'); return; }
    
    var statusEl = document.getElementById('fcAiStatus');
    var btn = document.querySelector('#modalContent .btn-primary');
    if (btn) btn.disabled = true;
    if (statusEl) statusEl.textContent = '正在识别...';
    
    // 从图片URL提取base64
    var base64 = imgData.split(',')[1];
    
    if (provider === 'openai') {
      this._visionOpenAI(apiKey, base64);
    } else if (provider === 'gemini') {
      this._visionGemini(apiKey, base64);
    }
  },

  /** OpenAI GPT-4o 视觉识别 */
  _visionOpenAI(apiKey, base64) {
    fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: '你是配方成分表识别专家。从图片中提取所有原材料的代号和含量百分比。返回纯JSON数组，格式: [{"code":"PV-101","pct":50,"name":"去离子水"}]。如果含量值是小数(如0.359712)，乘以100转为百分比。不要返回其他文字。' },
            { type: 'image_url', image_url: { url: 'data:image/png;base64,' + base64 } }
          ]
        }],
        max_tokens: 1024
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var text = data.choices?.[0]?.message?.content || '';
      FormulaCalc._visionParseResult(text);
    })
    .catch(function(err){
      document.querySelector('#modalContent .btn-primary').disabled = false;
      document.getElementById('fcAiStatus').textContent = '识别失败: ' + err.message;
    });
  },

  /** Google Gemini 视觉识别 */
  _visionGemini(apiKey, base64) {
    fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: '你是配方成分表识别专家。从图片中提取所有原材料的代号和含量百分比。返回纯JSON数组，格式: [{"code":"PV-101","pct":50,"name":"去离子水"}]。如果含量值是小数(如0.359712)，乘以100转为百分比。不要返回其他文字。' },
            { inline_data: { mime_type: 'image/png', data: base64 } }
          ]
        }]
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      FormulaCalc._visionParseResult(text);
    })
    .catch(function(err){
      document.querySelector('#modalContent .btn-primary').disabled = false;

  /** 解析 AI 返回结果并填入配方表 */
  _visionParseResult(text) {
    var btn = document.querySelector('#modalContent .btn-primary');

  /** 由AI（小美婷）识别后自动填入配方表 */
  fillFromAI(data) {
    // data: { listType: 'single'|'main'|'sub', materials: [{code, pct, price, name}] }
    if (!data || !data.materials || !data.listType) return;
    var listType = data.listType;
    var list = document.getElementById(this.getListId(listType));
    if (!list) return;
    list.innerHTML = '';
    var rawMaterials = DB.get('rawmaterials');
    var self = this;
    data.materials.forEach(function(m){
      self._counter++;
      var idx = self._counter;
      var prefix = listType === 'single' ? 'fcS' : (listType === 'main' ? 'fcM' : 'fcB');
      
      // 用 DOM API 构建行，避免字符串转义问题
      var row = document.createElement('div');
      row.id = 'fcRow_' + idx;
      row.dataset.listType = listType;
      row.style.cssText = 'margin-bottom:8px;padding:8px;border:1px solid var(--gray-200);border-radius:6px;';
      
      // 顶行：选择器 + 百分比 + 单价 + 贡献 + 删除按钮
      var topRow = document.createElement('div');
      topRow.style.cssText = 'display:flex;gap:8px;align-items:end;flex-wrap:wrap;';
      
      // 原材料下拉
      var selWrap = document.createElement('div');
      selWrap.style.cssText = 'flex:1;min-width:150px;';
      var sel = document.createElement('select');
      sel.className = 'form-control';
      sel.id = prefix + 'Raw_' + idx;
      sel.style.fontSize = '13px';
      sel.onchange = function(){ self.onRawChange(listType, idx); };
      var opt = document.createElement('option');
      opt.value = '';
      opt.textContent = '-- 选择原材料 --';
      sel.appendChild(opt);
      rawMaterials.forEach(function(r){
        var o = document.createElement('option');
        o.value = r.id;
        o.dataset.code = r.code;
        o.dataset.name = r.name;
        o.dataset.price = String(r.price);
        o.textContent = r.code + ' - ' + r.name + ' - ¥' + r.price + '/kg';
        if (r.code === m.code) o.selected = true;
        sel.appendChild(o);
      });
      selWrap.appendChild(sel);
      topRow.appendChild(selWrap);
      
      // 百分比输入
      var pctWrap = document.createElement('div');
      pctWrap.style.cssText = 'width:70px;';
      var pctInput = document.createElement('input');
      pctInput.className = 'form-control';
      pctInput.id = prefix + 'Pct_' + idx;
      pctInput.type = 'number';
      pctInput.step = '0.01';
      pctInput.value = String(m.pct.toFixed(2));
      pctInput.style.cssText = 'text-align:right;font-size:13px;';
      pctInput.oninput = function(){ self.recalc(listType); };
      pctWrap.appendChild(pctInput);
      topRow.appendChild(pctWrap);
      
      // 单价显示
      var priceSpan = document.createElement('div');
      priceSpan.style.cssText = 'width:90px;text-align:right;font-size:13px;padding:6px 0;';
      priceSpan.innerHTML = '¥<span id="' + prefix + 'UnitPrice_' + idx + '">' + (m.price || 0).toFixed(2) + '</span>/kg';
      topRow.appendChild(priceSpan);
      
      // 贡献显示
      var contribSpan = document.createElement('div');
      contribSpan.style.cssText = 'width:90px;text-align:right;font-size:13px;padding:6px 0;color:var(--primary);font-weight:bold;';
      contribSpan.innerHTML = '¥<span id="' + prefix + 'Contrib_' + idx + '">0.00</span>';
      topRow.appendChild(contribSpan);
      
      // 删除按钮
      var delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger';
      delBtn.textContent = '✕';

  },

  /** 处理文件选择 */
  handleFileSelect(event, listType) {
    const file = event.target.files?.[0];
    if (!file) return;
    FormulaCalc.readFile(file, listType);
  },

  /** 处理文件拖拽 */
  handleFileDrop(event) {
    event.preventDefault();
    const file = event.dataTransfer?.files?.[0];
    if (!file) return;
    FormulaCalc.readFile(file, null);
  },

  /** 读取文件内容 */
  readFile(file, listType) {
    const name = file.name.toLowerCase();
    const ext = name.split('.').pop();

    if (ext === 'csv' || ext === 'txt') {
      // 文本文件直接读取
      const reader = new FileReader();
      reader.onload = function(e){
        const text = e.target?.result;
        if (text) {
          document.getElementById('fcAiInput').value = text;
          showToast('已读取文件：' + file.name);
        }
      };
      reader.readAsText(file, 'utf-8');
    } 
    else if (ext === 'docx') {
      // docx 用 JSZip 读取文本
      showToast('正在解析Word文档...');
      const reader = new FileReader();
      reader.onload = function(e){
        var zip;
        try {
          // 尝试用PizZip解析（已加载的CDN库）
          if (typeof PizZip !== 'undefined') {
            zip = new PizZip(e.target?.result);
            var docXml = zip.file('word/document.xml')?.asText();
            if (docXml) {
              // 提取文本内容
              var text = docXml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
              // 尝试提取表格数据 - 找代号+数字模式
              var lines = [];
              var matches = text.match(/([A-Z]{2,3}-\d{3})\s*[\s\t]+\s*(\d+\.?\d*)/g);
              if (matches && matches.length > 0) {
                lines = matches.map(function(m){ return m.trim().replace(/\s+/g, '\t'); });
                document.getElementById('fcAiInput').value = lines.join('\n');
                showToast('已从Word文档提取 ' + lines.length + ' 条数据');
              } else {
                // 直接粘贴全文
                document.getElementById('fcAiInput').value = text;
                showToast('Word文档文本已提取，请手动调整格式');
              }
            }
          } else {
            showToast('Word解析库未加载，请粘贴文本', 'warning');
          }
        } catch(err) {
          showToast('Word解析失败：' + err.message, 'warning');
        }
      };
      reader.readAsArrayBuffer(file);
    }
    else if (ext === 'jpg' || ext === 'jpeg' || ext === 'png') {
      // 图片：用 AI Vision API 识别 (OpenAI GPT-4o / Google Gemini)
      closeModal();
      FormulaCalc._pendingListType = listType;
      
      var savedKey = localStorage.getItem('ai_vision_key') || '';
      var savedProvider = localStorage.getItem('ai_vision_provider') || 'openai';
      
      var reader = new FileReader();
      reader.onload = function(e){
        var imgData = e.target?.result;
        FormulaCalc._pendingImgData = imgData;
        openModal('🤖 AI视觉识别', '' +
          '<div style="max-height:240px;overflow:auto;margin-bottom:12px;text-align:center;background:var(--gray-50);border-radius:8px;padding:8px;">' +
            '<img src="' + imgData + '" style="max-width:100%;max-height:220px;object-fit:contain;">' +
          '</div>' +
          '<div id="fcVisionSetup">' +
            '<div style="display:flex;gap:8px;margin-bottom:8px;">' +
              '<select id="fcAiProvider" class="form-control" style="flex:1;">' +
                '<option value="openai"' + (savedProvider === 'openai' ? ' selected' : '') + '>OpenAI GPT-4o</option>' +
                '<option value="gemini"' + (savedProvider === 'gemini' ? ' selected' : '') + '>Google Gemini</option>' +
              '</select>' +
            '</div>' +
            '<input id="fcAiKeyInput" class="form-control" type="password" value="' + savedKey + '" placeholder="API Key (输入后自动保存到本地)" style="margin-bottom:8px;">' +
          '</div>' +
          '<div id="fcAiStatus" style="font-size:13px;margin-bottom:8px;color:var(--gray-500);"></div>' +
          '<button class="btn btn-primary" onclick="FormulaCalc.visionRecognize()" style="width:100%;">🚀 AI识别此图片</button>'
        );
      };
      reader.readAsDataURL(file);
    }  },

  /** 执行AI解析 */
  doAiParse(listType) {
    var text = document.getElementById('fcAiInput')?.value;
    if (!text || !text.trim()) { showToast('请粘贴数据', 'warning'); return; }

    var rawMaterials = DB.get('rawmaterials');
    // 构建代号→ID映射
    var codeToId = {};
    rawMaterials.forEach(function(r){ codeToId[r.code] = r; });

    // 按行分割
    var lines = text.trim().split('\n');
    var parsed = [];
    var errors = [];

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      // 跳过表头行
      if (/^(原材料|代号|代码|名称|成分|含量|单价|原料)/i.test(line)) continue;

      // 尝试分隔：Tab > 逗号 > 空格
      var parts;
      if (line.indexOf('\t') > -1) {
        parts = line.split('\t');
      } else if (line.indexOf('|') > -1) {
        parts = line.split('|');
      } else if (line.indexOf(',') > -1) {
        parts = line.split(',');
      } else {
        parts = line.split(/\s+/);
      }

      // 清理每个部分
      parts = parts.map(function(p){ return p.replace(/[%| ¥$,，\s]/g, '').trim(); }).filter(function(p){ return p; });

      if (parts.length < 2) {
        errors.push('第' + (i+1) + '行格式有误：' + line);
        continue;
      }

      var code = parts[0];
      var pct = parseFloat(parts[1]);
      if (isNaN(pct) || pct <= 0) {
        errors.push('第' + (i+1) + '行含量无效：' + line);
        continue;
      }

      // 匹配原材料库
      var match = codeToId[code];
      if (!match) {
        errors.push('第' + (i+1) + '行代号「' + code + '」未在原材料库中找到');
        continue;
      }

      parsed.push({ rawId: match.id, code: match.code, name: match.name, price: match.price, pct: pct });
    }

    if (parsed.length === 0) {
      showToast('未能解析任何有效数据：' + errors.join('; '), 'error');
      return;
    }

    // 归一化百分比
    var totalPct = 0;
    parsed.forEach(function(p){ totalPct += p.pct; });
    if (Math.abs(totalPct - 100) > 0.5) {
      // 按比例缩放到100%
      parsed.forEach(function(p){ p.pct = p.pct / totalPct * 100; });
    }

    closeModal();

    // 清空现有行，填充解析结果
    const listId = this.getListId(listType);
    const list = document.getElementById(listId);
    list.innerHTML = '';

    var self = this;
    parsed.forEach(function(p){
      var item = { code: p.code, name: p.name, pct: p.pct.toFixed(2), price: p.price };
      // 手动构造行
      self._counter++;
      var idx = self._counter;
      var prefix = listType === 'single' ? 'fcS' : (listType === 'main' ? 'fcM' : 'fcB');
      var rawOptions = DB.get('rawmaterials').map(function(r){
        return '<option value=\"' + r.id + '\" data-code=\"' + r.code + '\" data-name=\"' + r.name + '\" data-price=\"' + r.price + '\"' + (r.code === p.code ? ' selected' : '') + '>' + r.code + ' - ' + r.name + ' - ¥' + r.price + '/kg</option>';
      }).join('');

      var div = document.createElement('div');
      div.id = 'fcRow_' + idx;
      div.dataset.listType = listType;
      div.style.cssText = 'margin-bottom:8px;padding:8px;border:1px solid var(--gray-200);border-radius:6px;';
      div.innerHTML = '' +
        '<div style=\"display:flex;gap:8px;align-items:end;flex-wrap:wrap;\">' +
          '<div style=\"flex:1;min-width:150px;\">' +
            '<select class=\"form-control\" id=\"' + prefix + 'Raw_' + idx + '\" onchange=\"FormulaCalc.onRawChange(\'' + listType + '\',' + idx + ')\" style=\"font-size:13px;\">' +
              '<option value=\"\">-- 选择原材料 --</option>' + rawOptions +
            '</select>' +
          '</div>' +
          '<div style=\"width:70px;\">' +
            '<input class=\"form-control\" id=\"' + prefix + 'Pct_' + idx + '\" type=\"number\" step=\"0.01\" value=\"' + p.pct.toFixed(2) + '\" oninput=\"FormulaCalc.recalc(\'' + listType + '\')\" style=\"text-align:right;font-size:13px;\">' +
          '</div>' +
          '<div style=\"width:90px;text-align:right;font-size:13px;padding:6px 0;\">' +
            '¥<span id=\"' + prefix + 'UnitPrice_' + idx + '\">' + p.price.toFixed(2) + '</span>/kg' +
          '</div>' +
          '<div style=\"width:90px;text-align:right;font-size:13px;padding:6px 0;color:var(--primary);font-weight:bold;\">' +
            '¥<span id=\"' + prefix + 'Contrib_' + idx + '\">0.00</span>' +
          '</div>' +
          '<div>' +
            '<button class=\"btn btn-sm btn-danger\" onclick=\"FormulaCalc.removeRow(' + idx + ')\">✕</button>' +
          '</div>' +
        '</div>' +
        '<div style=\"display:flex;gap:8px;margin-top:4px;font-size:12px;color:var(--gray-500);\">' +
          '<span>代号：<span id=\"' + prefix + 'Code_' + idx + '\">' + p.code + '</span></span>' +
          '<span>名称：<span id=\"' + prefix + 'Name_' + idx + '\">' + p.name + '</span></span>' +
          '<span>单价：¥<span id=\"' + prefix + 'Price_' + idx + '\">' + p.price + '</span>/kg</span>' +
        '</div>';
      list.appendChild(div);
    });

    // 重新计算
    this.recalc(listType);

    // 提示
    var msg = '✅ 成功识别 ' + parsed.length + ' 种原材料';
    if (Math.abs(totalPct - 100) > 0.5) {
      msg += '（含量已自动归一化到100%）';
    }
    if (errors.length > 0) {
      msg += '，' + errors.length + ' 行解析失败';
    }
    showToast(msg);
    if (errors.length > 0) {
      setTimeout(function(){ showToast('失败行：' + errors.join(' | '), 'warning'); }, 1000);
    }
  },

        '</div>' +

          '<button class=\"btn btn-sm btn-danger\" onclick=\"FormulaCalc.removeRow(' + idx + ')\">✕</button>' +

      '<div style=\"display:flex;gap:8px;margin-top:4px;font-size:12px;color:var(--gray-500);\">' +
        '<span>代号：<span id=\"' + prefix + 'Code_' + idx + '\">-</span></span>' +
        '<span>名称：<span id=\"' + prefix + 'Name_' + idx + '\">-</span></span>' +

  },

  /** 选择原材料后更新信息 */
  onRawChange(listType, idx) {
    const prefix = listType === 'single' ? 'fcS' : (listType === 'main' ? 'fcM' : 'fcB');
    const sel = document.getElementById(prefix + 'Raw_' + idx);
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) {
      document.getElementById(prefix + 'Code_' + idx).textContent = '-';
      document.getElementById(prefix + 'Name_' + idx).textContent = '-';
      document.getElementById(prefix + 'Price_' + idx).textContent = '0';
      document.getElementById(prefix + 'UnitPrice_' + idx).textContent = '0.00';
    } else {
      document.getElementById(prefix + 'Code_' + idx).textContent = opt.dataset.code || '';
      document.getElementById(prefix + 'Name_' + idx).textContent = opt.dataset.name || '';
      document.getElementById(prefix + 'Price_' + idx).textContent = opt.dataset.price || '0';
      document.getElementById(prefix + 'UnitPrice_' + idx).textContent = parseFloat(opt.dataset.price || 0).toFixed(2);
    }
    this.recalc(listType);
  },

  /** 重新计算指定列表的合计 */
  recalc(listType) {
    const prefix = listType === 'single' ? 'fcS' : (listType === 'main' ? 'fcM' : 'fcB');
    const pctId = listType === 'single' ? 'fcSingleTotalPct' : (listType === 'main' ? 'fcMainTotalPct' : 'fcSubTotalPct');
    const priceId = listType === 'single' ? 'fcSinglePrice1kg' : (listType === 'main' ? 'fcMainPrice1kg' : 'fcSubPrice1kg');

    const list = document.getElementById(this.getListId(listType));
    const rows = list.querySelectorAll('[id^=\"fcRow_\"]');
    let totalPct = 0;
    let totalCost = 0;

    rows.forEach(function(row) {
      if (row.dataset.listType !== listType) return;
      const idMatch = row.id.match(/fcRow_(\d+)/);
      if (!idMatch) return;
      const idx = idMatch[1];
      const pct = parseFloat(document.getElementById(prefix + 'Pct_' + idx)?.value) || 0;
      const price = parseFloat(document.getElementById(prefix + 'Price_' + idx)?.textContent) || 0;
      const contrib = pct / 100 * price;
      document.getElementById(prefix + 'Contrib_' + idx).textContent = contrib.toFixed(2);
      totalPct += pct;
      totalCost += contrib;
    });

    document.getElementById(pctId).textContent = totalPct.toFixed(2) + '%';
    document.getElementById(priceId).textContent = '¥' + totalCost.toFixed(2);
    
    // 百分比不是100%时提醒
    if (Math.abs(totalPct - 100) > 0.01) {
      document.getElementById(pctId).style.color = 'var(--danger)';
    } else {
      document.getElementById(pctId).style.color = '';
    }

    // 如果是复合溶液，更新综合结果
    if (listType === 'main' || listType === 'sub') {
      this.recalcCompound();
    }
  },

  /** 计算复合溶液综合结果 */
  recalcCompound() {
    const mainPrice = parseFloat(document.getElementById('fcMainPrice1kg').textContent.replace('¥', '')) || 0;
    const subPrice = parseFloat(document.getElementById('fcSubPrice1kg').textContent.replace('¥', '')) || 0;
    const mainRatio = parseFloat(document.getElementById('fcMainRatio')?.value) || 3;
    const subRatio = parseFloat(document.getElementById('fcSubRatio')?.value) || 1;
    const totalParts = mainRatio + subRatio;

    // 加权平均
    const avgPrice = (mainPrice * mainRatio + subPrice * subRatio) / totalParts;

    const resultEl = document.getElementById('fcCompoundResult');
    if (mainPrice > 0 && subPrice > 0) {
      resultEl.innerHTML = '' +
        '<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;\">' +
          '<div style=\"padding:12px;background:var(--gray-50);border-radius:8px;text-align:center;\">' +
            '<p style=\"font-size:12px;color:var(--gray-500);\">主溶液</p>' +
            '<p style=\"font-size:20px;font-weight:bold;color:var(--primary);\">¥' + mainPrice.toFixed(2) + '/kg</p>' +
            '<p style=\"font-size:13px;color:var(--gray-500);\">占比 ' + (mainRatio / totalParts * 100).toFixed(0) + '%</p>' +
          '</div>' +
          '<div style=\"padding:12px;background:var(--gray-50);border-radius:8px;text-align:center;\">' +
            '<p style=\"font-size:12px;color:var(--gray-500);\">子溶液</p>' +
            '<p style=\"font-size:20px;font-weight:bold;color:var(--warning);\">¥' + subPrice.toFixed(2) + '/kg</p>' +
            '<p style=\"font-size:13px;color:var(--gray-500);\">占比 ' + (subRatio / totalParts * 100).toFixed(0) + '%</p>' +
          '</div>' +
          '<div style=\"padding:12px;background:var(--primary);border-radius:8px;text-align:center;\">' +
            '<p style=\"font-size:12px;color:#fff;opacity:0.8;\">复合溶液综合</p>' +
            '<p style=\"font-size:24px;font-weight:bold;color:#fff;\">¥' + avgPrice.toFixed(2) + '/kg</p>' +
            '<p style=\"font-size:13px;color:#fff;opacity:0.8;\">配比 ' + mainRatio + ':' + subRatio + '</p>' +
          '</div>' +
        '</div>';
    } else {
      resultEl.innerHTML = '<div class=\"empty-state\"><p>填写主溶液和子溶液成分后自动计算</p></div>';
    }
  },

  /** 删除行 */
  removeRow(idx) {
    const row = document.getElementById('fcRow_' + idx);
    if (!row) return;
    const listType = row.dataset.listType || 'single';
    row.remove();
    this.recalc(listType);
    // 检查对应列表是否为空
    const list = document.getElementById(this.getListId(listType));
    if (list.querySelectorAll('[id^=\"fcRow_\"]').length === 0) {
      list.innerHTML = '<div class=\"empty-state\"><p>点击「+ 添加原材料」添加成分</p></div>';
    }
  },

  /** 重置 */
  reset() {
    document.getElementById('fcCode').value = '';
    document.getElementById('fcType').value = '单一溶液';
    document.getElementById('fcCompoundInfo').style.display = 'none';
    document.getElementById('fcSingleSection').style.display = '';
    document.getElementById('fcCompoundSection').style.display = 'none';
    
    ['fcSingleList', 'fcMainList', 'fcSubList'].forEach(function(id){
      document.getElementById(id).innerHTML = '<div class=\"empty-state\"><p>点击「+ 添加原材料」添加成分</p></div>';
    });
    
    ['fcSingleTotalPct', 'fcMainTotalPct', 'fcSubTotalPct'].forEach(function(id){
      document.getElementById(id).textContent = '0.00%';
    });
    ['fcSinglePrice1kg', 'fcMainPrice1kg', 'fcSubPrice1kg'].forEach(function(id){
      document.getElementById(id).textContent = '¥0.00';
    });
    
    document.getElementById('fcCompoundResult').innerHTML = '<div class=\"empty-state\"><p>填写主溶液和子溶液成分后自动计算</p></div>';
    this._counter = 0;
  },

  /** 获取指定列表的成分数据 */
  getMaterials(listType) {
    const prefix = listType === 'single' ? 'fcS' : (listType === 'main' ? 'fcM' : 'fcB');
    const list = document.getElementById(this.getListId(listType));
    const rows = list.querySelectorAll('[id^=\"fcRow_\"]');
    const materials = [];
    rows.forEach(function(row) {
      if (row.dataset.listType !== listType) return;
      const idMatch = row.id.match(/fcRow_(\d+)/);
      if (!idMatch) return;
      const idx = idMatch[1];
      const sel = document.getElementById(prefix + 'Raw_' + idx);
      const opt = sel ? sel.options[sel.selectedIndex] : null;
      if (!opt || !opt.value) return;
      const pct = parseFloat(document.getElementById(prefix + 'Pct_' + idx)?.value) || 0;
      if (pct <= 0) return;
      materials.push({
        rawId: opt.value,
        code: opt.dataset.code || '',
        name: opt.dataset.name || '',
        price: parseFloat(opt.dataset.price || 0),
        pct: pct
      });
    });
    return materials;
  },

  /** 保存到配方管理 */
  saveToFormulas() {
    const code = document.getElementById('fcCode').value.trim();
    if (!code) { showToast('请输入配方号', 'warning'); return; }
    
    const type = document.getElementById('fcType').value;
    
    if (type === '单一溶液') {
      const materials = this.getMaterials('single');
      if (materials.length === 0) { showToast('请至少添加一种原材料', 'warning'); return; }
      let totalPct = 0;
      materials.forEach(function(m){ totalPct += m.pct; });
      if (Math.abs(totalPct - 100) > 0.1) {
        if (!confirm('成分含量总和为 ' + totalPct.toFixed(2) + '%，不是100%。是否继续保存？')) return;
      }
      const price1kg = parseFloat(document.getElementById('fcSinglePrice1kg').textContent.replace('¥', '')) || 0;
      const data = {
        code: code, name: code, price1kg: price1kg,
        yieldRate: 0.90, profit: 0,
        type: '单一溶液',
        materials: materials
      };
      var existing = DB.get('formulas').find(function(f){ return f.code === code; });
      if (existing) { if (!confirm('配方号「' + code + '」已存在，是否覆盖？')) return; DB.update('formulas', existing.id, data); showToast('配方已更新');
      } else { DB.add('formulas', data); showToast('配方已添加到配方管理'); }
      this.reset();
    } 
    else if (type === '复合溶液') {
      const mainMaterials = this.getMaterials('main');
      const subMaterials = this.getMaterials('sub');
      if (mainMaterials.length === 0) { showToast('请添加主溶液成分', 'warning'); return; }
      if (subMaterials.length === 0) { showToast('请添加子溶液成分', 'warning'); return; }
      
      let mainPct = 0; mainMaterials.forEach(function(m){ mainPct += m.pct; });
      let subPct = 0; subMaterials.forEach(function(m){ subPct += m.pct; });
      if (Math.abs(mainPct - 100) > 0.1) { if (!confirm('主溶液含量总和为 ' + mainPct.toFixed(2) + '%，不是100%。是否继续？')) return; }
      if (Math.abs(subPct - 100) > 0.1) { if (!confirm('子溶液含量总和为 ' + subPct.toFixed(2) + '%，不是100%。是否继续？')) return; }
      
      const mainPrice = parseFloat(document.getElementById('fcMainPrice1kg').textContent.replace('¥', '')) || 0;
      const subPrice = parseFloat(document.getElementById('fcSubPrice1kg').textContent.replace('¥', '')) || 0;
      const mainRatio = parseFloat(document.getElementById('fcMainRatio')?.value) || 3;
      const subRatio = parseFloat(document.getElementById('fcSubRatio')?.value) || 1;
      const totalParts = mainRatio + subRatio;
      const avgPrice = (mainPrice * mainRatio + subPrice * subRatio) / totalParts;
      
      const data = {
        code: code, name: code,
        price1kg: avgPrice,
        yieldRate: 0.90, profit: 0,
        type: '复合溶液',
        subRatio: mainRatio + ':' + subRatio,
        mainMaterials: mainMaterials,
        subMaterials: subMaterials,
        mainPrice1kg: mainPrice,
        subPrice1kg: subPrice
      };
      
      var existing = DB.get('formulas').find(function(f){ return f.code === code; });
      if (existing) { if (!confirm('配方号「' + code + '」已存在，是否覆盖？')) return; DB.update('formulas', existing.id, data); showToast('配方已更新');
      } else { DB.add('formulas', data); showToast('配方已添加到配方管理'); }
      this.reset();
    }
  }
};

/* ===== 初始化 & 路由监听 ===== */

let _navBusy = false;

// 页面加载时读取hash路由
function initRouter() {
  const hash = window.location.hash.replace('#', '') || 'dashboard';
  navigate(hash);
}

// 监听hash变化（避免重复导航）
window.addEventListener('hashchange', () => {
  if (_navBusy) return;
  const hash = window.location.hash.replace('#', '') || 'dashboard';
  navigate(hash);
});

// 点击导航链接
document.addEventListener('click', (e) => {
  const navItem = e.target.closest('.nav-item');
  if (navItem) {
    e.preventDefault();
    const page = navItem.dataset.page;
    if (page) {
      _navBusy = true;
      navigate(page);
      setTimeout(() => { _navBusy = false; }, 100);
    }
  }
});

// DOM就绪后启动
document.addEventListener('DOMContentLoaded', initRouter);
// 如果DOM已加载
if (document.readyState !== 'loading') {
  initRouter();
}


</script>
